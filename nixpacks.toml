[phases.setup]
nixPkgs = ['php84', 'php84Extensions.pgsql', 'php84Extensions.pdo_pgsql', 'php84Extensions.gd']

[phases.install]
cmds = ['composer install --no-dev --optimize-autoloader', 'npm install']

[phases.build]
cmds = ['npm run build', 'php artisan config:cache', 'php artisan route:cache', 'php artisan view:cache', 'php artisan storage:link']
